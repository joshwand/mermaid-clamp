<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mermaid-layout-constraints demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f5f5;
      color: #222;
    }

    h1 { margin-top: 0; font-size: 1.4rem; }
    h2 { font-size: 0.9rem; margin: 0 0 10px; color: #444; font-weight: 600; }

    .diagrams {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    .editors {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    .panel {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
    }

    .panel h2 span {
      font-size: 0.72rem;
      font-weight: normal;
      background: #eee;
      border-radius: 4px;
      padding: 2px 6px;
      margin-left: 8px;
      color: #666;
    }

    .diagram-wrap {
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .diagram-wrap svg {
      max-width: 100%;
      height: auto;
    }

    textarea {
      width: 100%;
      height: 220px;
      font-family: 'ui-monospace', 'Cascadia Code', 'Menlo', monospace;
      font-size: 0.78rem;
      line-height: 1.5;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #f8fafc;
      color: #1a1a2e;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus {
      border-color: #6c8ebf;
      background: #fff;
    }

    #status {
      margin-top: 16px;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 0.82rem;
      background: #e8f4fd;
      border: 1px solid #b3d7f5;
      color: #1a5276;
    }

    #status.error {
      background: #fdecea;
      border-color: #f5b7b1;
      color: #922b21;
    }

    #status.pending {
      background: #fefae8;
      border-color: #f5e0a0;
      color: #7d6608;
    }

    #status.warning {
      background: #fff8e8;
      border-color: #f0c040;
      color: #7a5500;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <h1>mermaid-layout-constraints — live editor</h1>

  <div id="status">Rendering…</div>

  <div class="diagrams">
    <div class="panel">
      <h2>Before <span>layout: dagre</span></h2>
      <div class="diagram-wrap" id="before"></div>
    </div>
    <div class="panel">
      <h2>After <span>layout: constrained-dagre</span></h2>
      <div class="diagram-wrap" id="after"></div>
    </div>
  </div>

  <div class="editors">
    <div class="panel">
      <h2>Diagram source</h2>
      <textarea id="diagram-source" spellcheck="false"></textarea>
    </div>
    <div class="panel">
      <h2>Constraints</h2>
      <textarea id="constraint-source" spellcheck="false"></textarea>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
