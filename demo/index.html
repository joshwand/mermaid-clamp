<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mermaid-layout-constraints demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f5f5;
      color: #222;
    }

    h1 { margin-top: 0; font-size: 1.4rem; }
    h2 { font-size: 1rem; margin: 0 0 12px; color: #444; }

    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 24px;
    }

    .panel {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
    }

    .panel h2 span {
      font-size: 0.75rem;
      font-weight: normal;
      background: #eee;
      border-radius: 4px;
      padding: 2px 6px;
      margin-left: 8px;
      color: #666;
    }

    .diagram-wrap {
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .diagram-wrap svg {
      max-width: 100%;
      height: auto;
    }

    pre {
      background: #f0f4f8;
      border: 1px solid #ccd;
      border-radius: 6px;
      padding: 12px;
      font-size: 0.78rem;
      overflow-x: auto;
      margin: 16px 0 0;
      white-space: pre-wrap;
    }

    #status {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      background: #e8f4fd;
      border: 1px solid #b3d7f5;
      color: #1a5276;
    }

    #status.error {
      background: #fdecea;
      border-color: #f5b7b1;
      color: #922b21;
    }
  </style>
</head>
<body>
  <h1>mermaid-layout-constraints — before / after</h1>
  <p>
    The same flowchart rendered with <strong>default dagre</strong> (left) and
    <strong>constrained-dagre</strong> (right). Drag-based editing is in Tasks 9–12.
  </p>

  <div id="status">Rendering…</div>

  <div class="columns">
    <div class="panel">
      <h2>Before <span>layout: dagre</span></h2>
      <div class="diagram-wrap" id="before"></div>
    </div>
    <div class="panel">
      <h2>After <span>layout: constrained-dagre</span></h2>
      <div class="diagram-wrap" id="after"></div>
    </div>
  </div>

  <div class="panel" style="margin-top:24px">
    <h2>Constraint block</h2>
    <pre id="constraint-text"></pre>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
